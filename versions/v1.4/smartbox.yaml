# =========================================================
# Revolt Nibe Smartbox V1.4.0 — Commercial-Grade Controller
# LilyGo T-CAN485 v1.1 + Nibe F1245 Heat Pump
# =========================================================

esphome:
  name: nibe-smartbox
  friendly_name: "Nibe Smartbox"
  build_path: "C:/tmp/esphome/nibe-smartbox"
  on_boot:
    - priority: 800
      then:
        - output.turn_on: ENABLE_PIN
        - output.turn_on: SE_PIN
        - output.turn_on: ENABLE_5V_PIN
    - priority: -100
      then:
        - light.turn_on:
            id: status_led
            red: 0%
            green: 0%
            blue: 100%
            brightness: 30%
        - wait_until:
            wifi.connected:
        - light.turn_on:
            id: status_led
            red: 0%
            green: 100%
            blue: 0%
            brightness: 20%
        - delay: 60s
        - wait_until:
            time.has_time:
        - script.execute: fetch_spot_price

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: DEBUG

globals:
  - id: spot_prices
    type: float[96]
  - id: tomorrow_fetched
    type: bool
    initial_value: "false"

api:
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  power_save_mode: none
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Nibe Smartbox Setup"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80
  version: 3

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Stockholm
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
    on_time:
      - seconds: 30
        minutes: 0
        hours: 0
        then:
          - logger.log: "Midnight — fetching new day prices"
          - lambda: 'id(tomorrow_fetched) = false;'
          - script.execute: fetch_spot_price

external_components:
  - source:
      type: git
      url: https://github.com/elupus/esphome-nibe
      ref: master

output:
  - platform: gpio
    id: ENABLE_PIN
    pin: { number: GPIO19, inverted: true }
  - platform: gpio
    id: SE_PIN
    pin: { number: GPIO17, inverted: true }
  - platform: gpio
    id: ENABLE_5V_PIN
    pin: { number: GPIO16, inverted: true }

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "Status LED"
    internal: true
    pin: GPIO4
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812

uart:
  id: modbus_uart
  rx_pin: GPIO21
  tx_pin: GPIO22
  baud_rate: 9600

nibegw:
  id: nibe_gw_hub
  uart_id: modbus_uart
  acknowledge:
    - MODBUS40
  udp:
    target:
      - ip: 255.255.255.255
        port: 9999

http_request:
  id: http_client
  useragent: esphome/nibe-smartbox
  timeout: 15s
  verify_ssl: false
  follow_redirects: true

sensor:
  - platform: template
    name: "Current Spot Price"
    id: current_spot_price
    unit_of_measurement: "öre/kWh"
    accuracy_decimals: 2
    device_class: monetary
    state_class: measurement
    icon: "mdi:cash"

  - platform: template
    name: "Daily Min Price"
    id: daily_min_price
    unit_of_measurement: "öre/kWh"
    accuracy_decimals: 2
    icon: "mdi:arrow-down"

  - platform: template
    name: "Daily Max Price"
    id: daily_max_price
    unit_of_measurement: "öre/kWh"
    accuracy_decimals: 2
    icon: "mdi:arrow-up"

  - platform: template
    name: "Today's Price Graph"
    id: today_price_graph
    unit_of_measurement: "öre/kWh"
    accuracy_decimals: 2
    icon: "mdi:chart-bell-curve"

  - platform: template
    name: "Tomorrow's Price Graph"
    id: tomorrow_price_graph
    unit_of_measurement: "öre/kWh"
    accuracy_decimals: 2
    icon: "mdi:chart-bell-curve-cumulative"

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    update_interval: 60s

text_sensor:
  - platform: template
    name: "Price Status"
    id: price_status
    icon: "mdi:information"

  - platform: template
    name: "Current Price Slot"
    id: current_price_slot
    icon: "mdi:clock-outline"

  - platform: template
    name: "Cheapest Period"
    id: cheapest_period
    icon: "mdi:clock-check-outline"

  - platform: wifi_info
    ip_address:
      name: "IP Address"
    mac_address:
      name: "MAC Address"

  - platform: version
    name: "ESPHome Version"

select:
  - platform: template
    id: control_mode
    name: "Control Mode"
    optimistic: true
    options:
      - "Home Assistant (Manual)"
      - "LilyGo Local (Spot Price)"
      - "Revolt Energy Cloud"
    initial_option: "LilyGo Local (Spot Price)"
    icon: "mdi:brain"
    set_action:
      - logger.log: "Control mode changed"
      - if:
          condition:
            lambda: 'return x == "Home Assistant (Manual)";'
          then:
            - script.execute: reset_to_neutral

  - platform: template
    id: hot_water_mode
    name: "Hot Water Mode"
    optimistic: true
    options:
      - "Economy"
      - "Normal"
      - "Luxury"
    initial_option: "Normal"
    set_action:
      - homeassistant.service:
          service: select.select_option
          data:
            entity_id: select.nibe_hot_water_mode
            option: !lambda 'return x;'

number:
  - platform: template
    id: heat_curve_offset
    name: "Heat Curve Offset"
    optimistic: true
    min_value: -10
    max_value: 10
    step: 1
    mode: box
    initial_value: 0
    restore_value: true
    set_action:
      - homeassistant.service:
          service: number.set_value
          data:
            entity_id: number.nibe_heat_curve_offset
            value: !lambda 'return x;'

  - platform: template
    id: emergency_threshold_percent
    name: "Emergency Threshold %"
    optimistic: true
    min_value: 50
    max_value: 100
    step: 5
    mode: box
    initial_value: 90
    restore_value: true
    unit_of_measurement: "%"
    icon: "mdi:cash-lock"

button:
  - platform: restart
    name: "Restart"
    icon: "mdi:restart"

  - platform: template
    name: "Update Spot Price"
    icon: "mdi:refresh"
    on_press:
      - script.execute: fetch_spot_price

script:
  - id: reset_to_neutral
    mode: single
    then:
      - logger.log: "Resetting to neutral"
      - lambda: 'id(price_status).publish_state("Manual Mode");'

  - id: fetch_spot_price
    mode: restart
    then:
      - http_request.get:
          url: !lambda |-
            auto time = id(sntp_time).now();
            char url[100];
            snprintf(url, sizeof(url),
              "https://www.elprisetjustnu.se/api/v1/prices/%04d/%02d-%02d_SE3.json",
              time.year, time.month, time.day_of_month);
            return std::string(url);
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) { id(price_status).publish_state("HTTP Error"); return; }
                  float mn = 999999.0f, mx = -999999.0f;
                  size_t sp = 0;
                  int idx = 0;
                  while ((sp = body.find("\"SEK_per_kWh\":", sp)) != std::string::npos && idx < 96) {
                    sp += 14;
                    size_t ep = body.find_first_of(",}", sp);
                    if (ep == std::string::npos) break;
                    float p = atof(body.substr(sp, ep - sp).c_str()) * 100.0f;
                    if (idx % 2 == 0) id(spot_prices)[idx/2] = p;
                    else id(spot_prices)[idx/2] = (id(spot_prices)[idx/2] + p) / 2.0f;
                    if (p < mn) mn = p;
                    if (p > mx) mx = p;
                    idx++;
                  }
                  id(daily_min_price).publish_state(mn);
                  id(daily_max_price).publish_state(mx);

                  // Calculate cheapest period
                  int best_start = -1;
                  float min_sum = 999999.0f;
                  int max_idx = id(tomorrow_fetched) ? 96 : 48;
                  for (int i = 0; i <= max_idx - 2; i++) {
                    float sum = id(spot_prices)[i] + id(spot_prices)[i+1];
                    if (sum < min_sum) { min_sum = sum; best_start = i; }
                  }
                  id(cheapest_period).publish_state("Calculated");

                  // Feed today graph
                  for (int i = 0; i < 48; i++) {
                    float val = id(spot_prices)[i];
                    if (best_start != -1 && i >= best_start && i < best_start + 2) val = mn;
                    id(today_price_graph).publish_state(val);
                  }
              - script.execute: fetch_tomorrow_price

  - id: fetch_tomorrow_price
    mode: restart
    then:
      - http_request.get:
          url: !lambda |-
            auto time = id(sntp_time).now();
            auto tomorrow = ESPTime::from_epoch_local(time.timestamp + 86400);
            char url[100];
            snprintf(url, sizeof(url),
              "https://www.elprisetjustnu.se/api/v1/prices/%04d/%02d-%02d_SE3.json",
              tomorrow.year, tomorrow.month, tomorrow.day_of_month);
            return std::string(url);
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) { id(tomorrow_fetched) = false; return; }
                  size_t sp = 0;
                  int idx = 0;
                  while ((sp = body.find("\"SEK_per_kWh\":", sp)) != std::string::npos && idx < 96) {
                    sp += 14;
                    size_t ep = body.find_first_of(",}", sp);
                    if (ep == std::string::npos) break;
                    float p = atof(body.substr(sp, ep - sp).c_str()) * 100.0f;
                    if (idx % 2 == 0) id(spot_prices)[48 + idx/2] = p;
                    else id(spot_prices)[48 + idx/2] = (id(spot_prices)[48 + idx/2] + p) / 2.0f;
                    idx++;
                  }
                  id(tomorrow_fetched) = true;
                  // Feed tomorrow graph
                  for (int i = 48; i < 96; i++) {
                    id(tomorrow_price_graph).publish_state(id(spot_prices)[i]);
                  }

interval:
  - interval: 15min
    then:
      - script.execute: fetch_spot_price
