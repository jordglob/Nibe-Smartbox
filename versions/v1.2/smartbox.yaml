# =========================================================
# SPOT PRICE SENSORS (Active)
# =========================================================
sensor:
  # Spot Price Sensor (updated via HTTP request)
  - platform: template
    name: "Current Spot Price"
    id: current_spot_price
    unit_of_measurement: "+Âre/kWh"
    accuracy_decimals: 2
    device_class: monetary
    state_class: measurement
    icon: "mdi:cash"

  # Daily price statistics for smart logic
  - platform: template
    name: "Daily Min Price"
    id: daily_min_price
    unit_of_measurement: "+Âre/kWh"
    accuracy_decimals: 2
    icon: "mdi:arrow-down"

  - platform: template
    name: "Daily Max Price"
    id: daily_max_price
    unit_of_measurement: "+Âre/kWh"
    accuracy_decimals: 2
    icon: "mdi:arrow-up"

# =========================================================
# NIBE CONTROL (via Home Assistant services)
# Note: Direct register writing requires Home Assistant integration
# =========================================================
number:
  - platform: template
    id: heat_curve_offset
    name: "Heat Curve Offset"
    optimistic: true
    min_value: -10
    max_value: 10
    step: 1
    mode: box
    initial_value: 0
    set_action:
      - homeassistant.service:
          service: number.set_value
          data:
            entity_id: number.nibe_heat_curve_offset
            value: !lambda 'return x;'

select:
  - platform: template
    id: hot_water_mode
    name: "Hot Water Mode"
    optimistic: true
    options:
      - "Economy"
      - "Normal"
      - "Luxury"
    initial_option: "Normal"
    set_action:
      - homeassistant.service:
          service: select.select_option
          data:
            entity_id: select.nibe_hot_water_mode
            option: !lambda 'return x;'

# =========================================================
# HTTP REQUEST COMPONENT (Spot Price Fetching)
# =========================================================
http_request:
  id: http_client
  useragent: esphome/nibe-smartbox
  timeout: 10s
  verify_ssl: false  # Bypass SSL verification for ESP32 compatibility

# =========================================================
# TEXT SENSORS (For price status)
# =========================================================
text_sensor:
  - platform: template
    name: "Price Status"
    id: price_status
    icon: "mdi:information"

# =========================================================
# RESTART BUTTON
# =========================================================
button:
  - platform: restart
    name: "Restart"
    icon: "mdi:restart"

  # Manual spot price update button
  - platform: template
    name: "Update Spot Price"
    icon: "mdi:refresh"
    on_press:
      - script.execute: fetch_spot_price

# =========================================================
# SMART CONTROL LOGIC
# =========================================================
script:
  - id: fetch_spot_price
    mode: restart
    then:
      - logger.log: "Fetching current spot price..."
      - http_request.get:
          url: !lambda |-
            auto time = id(sntp_time).now();
            char url[100];
            snprintf(url, sizeof(url), "https://www.elprisetjustnu.se/api/v1/prices/%04d/%02d-%02d_SE3.json",
                     time.year, time.month, time.day_of_month);
            ESP_LOGI("spot_price", "Fetching from URL: %s", url);
            return std::string(url);
          capture_response: true
          max_response_buffer_size: 16384
          on_response:
            then:
              - lambda: |-
                  ESP_LOGD("spot_price", "HTTP Response Code: %d", response->status_code);
                  
                  if (response->status_code != 200) {
                    ESP_LOGE("spot_price", "HTTP request failed with code: %d", response->status_code);
                    id(price_status).publish_state("HTTP Error");
                    return;
                  }
                  
                  // body parameter is already available from on_response
                  ESP_LOGI("spot_price", "Response body length: %d bytes", body.length());
                  
                  if (body.length() >= 16000) {
                    ESP_LOGW("spot_price", "WARNING: Response may be truncated! Increase buffer size.");
                  }
                  
                  // Get current hour
                  auto time = id(sntp_time).now();
                  int current_hour = time.hour;
                  ESP_LOGI("spot_price", "Current hour: %d", current_hour);
                  
                  // Debug: Show first 200 chars of JSON
                  ESP_LOGD("spot_price", "JSON start: %.200s", body.c_str());
                  
                  // Simple JSON parsing for current hour price
                  // Format: [{"time_start":"2026-03-15T00:00:00+01:00","SEK_per_kWh":0.85,"EUR_per_kWh":0.08}, ...]
                  
                  // Find the price for current hour - use dynamic date
                  char search_pattern[50];
                  snprintf(search_pattern, sizeof(search_pattern), "\"time_start\":\"%04d-%02d-%02dT%02d:",
                           time.year, time.month, time.day_of_month, current_hour);
                  
                  ESP_LOGD("spot_price", "Searching for pattern: %s", search_pattern);
                  
                  int start_pos = body.find(search_pattern);
                  if (start_pos == std::string::npos) {
                    ESP_LOGW("spot_price", "Could not find price for hour %d with pattern: %s", current_hour, search_pattern);
                    // Debug: Show last 200 chars to see if data is truncated
                    ESP_LOGD("spot_price", "JSON end: ...%s", body.substr(body.length() - 200).c_str());
                    id(price_status).publish_state("Price not found");
                    return;
                  }
                  
                  // Find SEK_per_kWh value
                  int sek_pos = body.find("\"SEK_per_kWh\":", start_pos);
                  if (sek_pos == std::string::npos) {
                    ESP_LOGW("spot_price", "Could not parse SEK_per_kWh");
                    return;
                  }
                  
                  sek_pos += 14; // Skip "SEK_per_kWh":
                  int end_pos = body.find_first_of(",}", sek_pos);
                  std::string price_str = body.substr(sek_pos, end_pos - sek_pos);
                  
                  float price_sek = std::stof(price_str);
                  float price_ore = price_sek * 100.0; // Convert SEK to +Âre
                  
                  ESP_LOGI("spot_price", "Ô£ô Current spot price: %.2f +Âre/kWh (%.4f SEK/kWh)", price_ore, price_sek);
                  
                  id(current_spot_price).publish_state(price_ore);
                  
                  // Calculate daily min/max for smart logic
                  float min_price = 999999.0;
                  float max_price = -999999.0;
                  
                  // Parse all 24 hours
                  size_t pos = 0;
                  while ((pos = body.find("\"SEK_per_kWh\":", pos)) != std::string::npos) {
                    pos += 14;
                    size_t end = body.find_first_of(",}", pos);
                    float p = std::stof(body.substr(pos, end - pos)) * 100.0;
                    if (p < min_price) min_price = p;
                    if (p > max_price) max_price = p;
                  }
                  
                  id(daily_min_price).publish_state(min_price);
                  id(daily_max_price).publish_state(max_price);
                  
                  ESP_LOGI("spot_price", "Daily range: %.2f - %.2f +Âre/kWh", min_price, max_price);
                  
                  // SMART CONTROL LOGIC
                  float price_range = max_price - min_price;
                  float low_threshold = min_price + (price_range * 0.25); // Lowest 25%
                  
                  // Logic 1: Heat Curve Offset based on price
                  if (price_ore <= low_threshold) {
                    ESP_LOGI("smart_control", "LOW PRICE - Setting Heat Curve Offset to +2");
                    auto call = id(heat_curve_offset).make_call();
                    call.set_value(2);
                    call.perform();
                    id(price_status).publish_state("Low Price - Heating Boost");
                  } else if (price_ore >= (min_price + price_range * 0.75)) {
                    ESP_LOGI("smart_control", "HIGH PRICE - Setting Heat Curve Offset to -2");
                    auto call = id(heat_curve_offset).make_call();
                    call.set_value(-2);
                    call.perform();
                    id(price_status).publish_state("High Price - Heating Reduced");
                  } else {
                    ESP_LOGI("smart_control", "NORMAL PRICE - Setting Heat Curve Offset to 0");
                    auto call = id(heat_curve_offset).make_call();
                    call.set_value(0);
                    call.perform();
                    id(price_status).publish_state("Normal Price");
                  }
                  
                  // Logic 2: Hot Water Mode based on extreme low price
                  if (price_ore < 10.0) {
                    ESP_LOGI("smart_control", "EXTREMELY LOW PRICE - Setting Hot Water to Luxury");
                    auto call = id(hot_water_mode).make_call();
                    call.set_option("Luxury");
                    call.perform();
                  } else if (price_ore > (min_price + price_range * 0.75)) {
                    ESP_LOGI("smart_control", "HIGH PRICE - Setting Hot Water to Economy");
                    auto call = id(hot_water_mode).make_call();
                    call.set_option("Economy");
                    call.perform();
                  } else {
                    ESP_LOGI("smart_control", "NORMAL PRICE - Setting Hot Water to Normal");
                    auto call = id(hot_water_mode).make_call();
                    call.set_option("Normal");
                    call.perform();
                  }

# =========================================================
# AUTOMATION - Hourly Spot Price Update
# =========================================================
interval:
  - interval: 60min
    then:
      - script.execute: fetch_spot_price
