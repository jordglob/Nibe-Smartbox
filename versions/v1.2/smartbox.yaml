# =========================================================
# Nibe Smartbox - Commercial-Grade Smart Controller
# LilyGo T-CAN485 v1.1 + Nibe F1245 Heat Pump
# =========================================================

esphome:
  name: nibe-smartbox
  friendly_name: "Nibe Smartbox"
  build_path: "C:/tmp/esphome/nibe-smartbox"
  on_boot:
    priority: -100
    then:
      - wait_until:
          wifi.connected:
      - delay: 30s  # Increased delay to ensure time sync completes
      - wait_until:
          time.has_time:
      - script.execute: fetch_spot_price

esp32:
  board: esp32dev
  framework:
    type: arduino  # CRITICAL: Using Arduino framework as specified

logger:
  level: DEBUG

api:
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: "YOUR_PASSWORD"

wifi:
  power_save_mode: none
  ssid: "YOUR_WIFI_SSID"
  password: "YOUR_PASSWORD"
  ap:
    ssid: "Nibe Smartbox Setup"
    password: "YOUR_PASSWORD"

captive_portal:

web_server:
  port: 80
  version: 3

# =========================================================
# TIME COMPONENT (SNTP)
# =========================================================
time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Stockholm
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org

# =========================================================
# NIBE GATEWAY (UDP Gateway for Home Assistant)
# =========================================================
external_components:
  - source:
      type: git
      url: https://github.com/elupus/esphome-nibe
      ref: master

# CRITICAL HARDWARE SETUP - LilyGo T-CAN485 v1.1
# Hardware auto-direction RS485 - NO dir_pin!
output:
  - platform: gpio
    id: ENABLE_PIN
    pin: { number: GPIO19, inverted: true }
  - platform: gpio
    id: SE_PIN
    pin: { number: GPIO17, inverted: true }
  - platform: gpio
    id: ENABLE_5V_PIN
    pin: { number: GPIO16, inverted: true }

uart:
  id: modbus_uart
  rx_pin: GPIO21
  tx_pin: GPIO22
  baud_rate: 9600
  # NO dir_pin - hardware auto-direction!

nibegw:
  id: nibe_gw_hub
  uart_id: modbus_uart
  acknowledge:
    - MODBUS40
  udp:
    target:
      - ip: 255.255.255.255
        port: 9999

# =========================================================
# NIBE SENSORS - COMMENTED OUT FOR v1.2
