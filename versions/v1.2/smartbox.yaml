# 1. Custom Nibe register parsing component (direct ESP32 parsing)
# 2. Visual representation of pump data
# 3. Real-time temperature/status display on local web interface
#
# For now, Nibe sensor data is available in Home Assistant via the Nibe integration.
# The ESP32 smart control uses ONLY spot prices (no temperature feedback).
# =========================================================
